server {
  listen 443 ssl;
  server_name funhome.eggorkiwi.eu;

  ssl_certificate /etc/letsencrypt/live/funhome.eggorkiwi.eu-0001/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/funhome.eggorkiwi.eu-0001/privkey.pem;

  client_max_body_size 0;

  location = /zigbee2mqtt {
    return 301 /zigbee2mqtt/;
  }

  location /zigbee2mqtt/ {
    proxy_pass http://zigbee2mqtt:8080/;
    proxy_http_version 1.1;
    proxy_buffering off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Prefix /zigbee2mqtt;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location / {
    proxy_pass http://homeassistant:8123;
    proxy_http_version 1.1;
    proxy_buffering off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
